<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاهدة يوتيوب مع بعض</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --surface: #14141f;
    --surface-2: #1b1b29;
    --cyan: #00e5ff;
    --pink: #ff2ea6;
    --text: #eef0ff;
    --text-dim: #8d8fb0;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Cairo', -apple-system, "Segoe UI", Tahoma, sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(0,229,255,0.08), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(255,46,166,0.08), transparent 40%),
      var(--bg);
    color: var(--text);
    margin: 0;
    padding: 14px;
    min-height: 100vh;
  }

  h2 {
    margin: 0 0 12px;
    font-size: 17px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h2 .glow-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 10px 2px var(--cyan);
  }

  .row { display: flex; gap: 8px; margin-bottom: 12px; }

  input[type="text"], #urlInput, #chatText {
    flex: 1;
    padding: 12px 16px;
    font-size: 14px;
    border-radius: var(--radius-md);
    border: 1px solid rgba(0,229,255,0.25);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: box-shadow .2s, border-color .2s;
  }
  input[type="text"]:focus, #urlInput:focus, #chatText:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.15);
  }
  input::placeholder { color: var(--text-dim); }

  .btn {
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 700;
    border-radius: var(--radius-md);
    border: none;
    cursor: pointer;
    white-space: nowrap;
    background: linear-gradient(135deg, var(--cyan), var(--pink));
    color: #06060a;
    box-shadow: 0 0 16px -2px rgba(0,229,255,0.5);
    transition: transform .15s, box-shadow .15s;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 0 22px -2px rgba(0,229,255,0.7); }
  .btn:active { transform: translateY(0); }

  #player-wrap {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid rgba(255,46,166,0.2);
    box-shadow: 0 0 30px -8px rgba(255,46,166,0.35);
  }
  #player { width: 100%; height: 100%; }

  #status {
    margin: 10px 0 16px;
    font-size: 12px;
    color: var(--cyan);
    text-shadow: 0 0 8px rgba(0,229,255,0.5);
  }

  #chat-box {
    border: 1px solid rgba(0,229,255,0.15);
    border-radius: var(--radius-lg);
    background: var(--surface);
    height: 280px;
    overflow-y: auto;
    padding: 12px;
    margin-bottom: 10px;
  }
  #chat-box::-webkit-scrollbar { width: 6px; }
  #chat-box::-webkit-scrollbar-thumb {
    background: linear-gradient(var(--cyan), var(--pink));
    border-radius: 10px;
  }

  .msg {
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.5;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .msg .name {
    color: var(--pink);
    font-weight: 700;
    text-shadow: 0 0 6px rgba(255,46,166,0.35);
  }
  .msg img {
    max-width: 100%;
    border-radius: var(--radius-sm);
    margin-top: 6px;
    display: block;
    cursor: pointer;
  }
  .msg audio { margin-top: 6px; width: 100%; max-width: 260px; border-radius: 20px; }

  #chat-input-row { display: flex; gap: 6px; align-items: center; }

  .icon-btn {
    background: var(--surface);
    border: 1px solid rgba(0,229,255,0.25);
    color: var(--cyan);
    border-radius: var(--radius-md);
    width: 44px; height: 44px;
    min-width: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: box-shadow .2s, border-color .2s;
  }
  .icon-btn:hover { border-color: var(--cyan); box-shadow: 0 0 12px -2px rgba(0,229,255,0.5); }
  .icon-btn svg { width: 20px; height: 20px; }

  .icon-btn.recording {
    background: rgba(255,46,166,0.15);
    border-color: var(--pink);
    color: var(--pink);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 8px 0 rgba(255,46,166,0.6); }
    50% { box-shadow: 0 0 18px 4px rgba(255,46,166,0.8); }
  }

  #recTimer { font-size: 12px; color: var(--pink); margin-inline-start: 2px; min-width: 34px; }

  #imgModal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(5,5,10,0.92);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  #imgModal img { max-width: 95%; max-height: 95%; border-radius: var(--radius-lg); }
</style>
</head>
<body>

<h2><span class="glow-dot"></span> مشاهدة يوتيوب مع بعض</h2>

<div class="row">
  <input type="text" id="urlInput" placeholder="الصق رابط فيديو يوتيوب هنا">
  <button class="btn" onclick="loadVideoFromInput()">تشغيل للجميع</button>
</div>

<div id="player-wrap"><div id="player"></div></div>
<div id="status">جاري الاتصال...</div>

<h2 style="font-size:15px;"><span class="glow-dot"></span> الدردشة</h2>
<div id="chat-box"></div>
<div id="chat-input-row">
  <button class="icon-btn" onclick="document.getElementById('imgFile').click()" title="إرسال صورة">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
  </button>
  <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="onImageSelected(event)">

  <button class="icon-btn" id="micBtn" onclick="toggleRecording()" title="رسالة صوتية">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
  <span id="recTimer"></span>

  <input type="text" id="chatText" placeholder="اكتب رسالة..." onkeydown="if(event.key==='Enter') sendChat()">

  <button class="icon-btn" onclick="sendChat()" title="إرسال" style="color:#06060a;background:linear-gradient(135deg, var(--cyan), var(--pink)); border:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/>
      <polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<div id="imgModal" onclick="this.style.display='none'"><img id="imgModalSrc"></div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// لو الصفحة مفتوحة جوا تيليغرام (كـ Mini App)، وسّعها لتاخذ كامل الشاشة
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

const params = new URLSearchParams(window.location.search);
const roomCode = params.get("room") || "public";
document.title = "مشاهدة مع بعض - " + roomCode;

// اسم المستخدم: من تيليغرام لو متوفر، وإلا نسأله مرة وحدة
let myName = "زائر";
try {
  const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
  if (tgUser && tgUser.first_name) myName = tgUser.first_name;
} catch (e) {}
if (myName === "زائر") {
  const entered = prompt("اكتب اسمك اللي يبان بالدردشة:", "");
  if (entered && entered.trim()) myName = entered.trim();
}

let player;
let ws;
let ignoreEvents = false; // لتفادي حلقة لا نهائية عند تطبيق تحديثات جاية من طرف آخر

// ---------- مشغل يوتيوب ----------
function extractVideoId(url) {
  const patterns = [/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]{11})/];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  if (/^[\w-]{11}$/.test(url.trim())) return url.trim();
  return null;
}

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '100%', width: '100%', videoId: '',
    events: { onStateChange: onPlayerStateChange }
  });
  connectWS();
}

function loadVideoFromInput() {
  const videoId = extractVideoId(document.getElementById("urlInput").value);
  if (!videoId) { alert("رابط يوتيوب غير صالح"); return; }
  ws.send(JSON.stringify({ type: "load_video", video_id: videoId }));
}

function onPlayerStateChange(event) {
  if (ignoreEvents || !ws || ws.readyState !== 1) return;
  const currentTime = player.getCurrentTime();
  if (event.data === YT.PlayerState.PLAYING) {
    ws.send(JSON.stringify({ type: "play", current_time: currentTime }));
  } else if (event.data === YT.PlayerState.PAUSED) {
    ws.send(JSON.stringify({ type: "pause", current_time: currentTime }));
  }
}

// ---------- اتصال الويب سوكت ----------
function connectWS() {
  const protocol = window.location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${protocol}://${window.location.host}/ws/${roomCode}`);

  ws.onopen = () => setStatus("متصل ✅ - الغرفة: " + roomCode);
  ws.onclose = () => { setStatus("انقطع الاتصال، جاري إعادة المحاولة..."); setTimeout(connectWS, 2000); };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    switch (data.type) {
      case "sync":
      case "load_video":
        ignoreEvents = true;
        if (data.video_id) player.loadVideoById(data.video_id, data.current_time || 0);
        if (data.is_playing === false) setTimeout(() => player.pauseVideo(), 300);
        setTimeout(() => { ignoreEvents = false; }, 500);
        break;

      case "play":
        ignoreEvents = true;
        player.seekTo(data.current_time, true);
        player.playVideo();
        setTimeout(() => { ignoreEvents = false; }, 500);
        break;

      case "pause":
        ignoreEvents = true;
        player.seekTo(data.current_time, true);
        player.pauseVideo();
        setTimeout(() => { ignoreEvents = false; }, 500);
        break;

      case "seek":
        ignoreEvents = true;
        player.seekTo(data.current_time, true);
        setTimeout(() => { ignoreEvents = false; }, 500);
        break;

      case "viewers":
        setStatus(`متصل ✅ - الغرفة: ${roomCode} - المشاهدين: ${data.count}`);
        break;

      case "chat":
        addChatMessage(data.name, data.text, null, null);
        break;

      case "image":
        addChatMessage(data.name, null, data.data, null);
        break;

      case "voice":
        addChatMessage(data.name, null, null, data.data);
        break;

      case "error":
        alert(data.message);
        break;
    }
  };
}

function setStatus(text) { document.getElementById("status").innerText = text; }

// ---------- الدردشة ----------
function addChatMessage(name, text, imageData, voiceData) {
  const box = document.getElementById("chat-box");
  const div = document.createElement("div");
  div.className = "msg";

  const nameSpan = document.createElement("span");
  nameSpan.className = "name";
  nameSpan.innerText = name + ": ";
  div.appendChild(nameSpan);

  if (text) div.appendChild(document.createTextNode(text));

  if (imageData) {
    const img = document.createElement("img");
    img.src = imageData;
    img.onclick = () => {
      document.getElementById("imgModalSrc").src = imageData;
      document.getElementById("imgModal").style.display = "flex";
    };
    div.appendChild(document.createElement("br"));
    div.appendChild(img);
  }

  if (voiceData) {
    const audio = document.createElement("audio");
    audio.controls = true;
    audio.src = voiceData;
    div.appendChild(document.createElement("br"));
    div.appendChild(audio);
  }

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function sendChat() {
  const input = document.getElementById("chatText");
  const text = input.value.trim();
  if (!text) return;
  ws.send(JSON.stringify({ type: "chat", name: myName, text }));
  input.value = "";
}

function onImageSelected(event) {
  const file = event.target.files[0];
  if (!file) return;

  // نصغّر الصورة قبل الإرسال لتفادي رسائل ثقيلة جداً
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const maxDim = 1000;
      let { width, height } = img;
      if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; }
      else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
      ws.send(JSON.stringify({ type: "image", name: myName, data: dataUrl }));
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
  event.target.value = "";
}

// ---------- الرسائل الصوتية ----------
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let recordStartTime = 0;
let recTimerInterval = null;

async function toggleRecording() {
  if (!isRecording) {
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      alert("ما قدرنا نوصل للمايكروفون. تأكد من إعطاء الإذن.");
      return;
    }

    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: "audio/webm" });
      const reader = new FileReader();
      reader.onload = () => {
        ws.send(JSON.stringify({ type: "voice", name: myName, data: reader.result }));
      };
      reader.readAsDataURL(blob);
    };

    mediaRecorder.start();
    isRecording = true;
    recordStartTime = Date.now();
    document.getElementById("micBtn").classList.add("recording");
    recTimerInterval = setInterval(() => {
      const secs = Math.floor((Date.now() - recordStartTime) / 1000);
      document.getElementById("recTimer").innerText = `⏺ ${secs}s`;
    }, 300);
  } else {
    mediaRecorder.stop();
    isRecording = false;
    clearInterval(recTimerInterval);
    document.getElementById("recTimer").innerText = "";
    document.getElementById("micBtn").classList.remove("recording");
  }
}
</script>
</body>
</html>
