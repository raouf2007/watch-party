<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاهدة يوتيوب مع بعض</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Tahoma, sans-serif;
    background: #0e0e12;
    color: #eee;
    margin: 0;
    padding: 12px;
  }
  h2 { margin: 0 0 10px; font-size: 17px; }
  .row { display: flex; gap: 8px; margin-bottom: 10px; }
  .row input {
    flex: 1;
    padding: 10px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a20;
    color: #eee;
  }
  .row button {
    padding: 10px 14px;
    font-size: 14px;
    border-radius: 8px;
    border: none;
    background: #2b7cff;
    color: #fff;
    cursor: pointer;
    white-space: nowrap;
  }

  #player-wrap {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
  }
  #player { width: 100%; height: 100%; }

  #status { margin: 8px 0 14px; font-size: 12px; color: #7fb0ff; }

  #chat-box {
    border: 1px solid #2a2a33;
    border-radius: 8px;
    background: #14141a;
    height: 280px;
    overflow-y: auto;
    padding: 8px;
    margin-bottom: 8px;
  }
  .msg { margin-bottom: 10px; font-size: 13px; line-height: 1.4; }
  .msg .name { color: #7fb0ff; font-weight: bold; }
  .msg img { max-width: 100%; border-radius: 6px; margin-top: 4px; display: block; cursor: pointer; }
  .msg audio { margin-top: 4px; width: 100%; max-width: 260px; }

  #chat-input-row { display: flex; gap: 6px; align-items: center; }
  #chatText {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a20;
    color: #eee;
    font-size: 14px;
  }
  .icon-btn {
    background: #1a1a20;
    border: 1px solid #333;
    color: #eee;
    border-radius: 8px;
    padding: 10px 12px;
    cursor: pointer;
    font-size: 16px;
  }
  .icon-btn.recording {
    background: #d9463f;
    color: #fff;
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  #recTimer { font-size: 12px; color: #ff8a80; margin-inline-start: 4px; }

  #imgModal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }
  #imgModal img { max-width: 95%; max-height: 95%; border-radius: 8px; }
</style>
</head>
<body>

<h2>🎬 مشاهدة يوتيوب مع بعض</h2>

<div class="row">
  <input id="urlInput" placeholder="الصق رابط فيديو يوتيوب هنا">
  <button onclick="loadVideoFromInput()">تشغيل للجميع</button>
</div>

<div id="player-wrap"><div id="player"></div></div>
<div id="status">جاري الاتصال...</div>

<h2 style="font-size:15px;">💬 الدردشة</h2>
<div id="chat-box"></div>
<div id="chat-input-row">
  <button class="icon-btn" onclick="document.getElementById('imgFile').click()">📷</button>
  <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="onImageSelected(event)">
  <button class="icon-btn" id="micBtn" onclick="toggleRecording()">🎙️</button>
  <span id="recTimer"></span>
  <input id="chatText" placeholder="اكتب رسالة..." onkeydown="if(event.key==='Enter') sendChat()">
  <button onclick="sendChat()">إرسال</button>
</div>

<div id="imgModal" onclick="this.style.display='none'"><img id="imgModalSrc"></div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// لو الصفحة مفتوحة جوا تيليغرام (كـ Mini App)، وسّعها لتاخذ كامل الشاشة
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

const params = new URLSearchParams(window.location.search);
const roomCode = params.get("room") || "public";
document.title = "مشاهدة مع بعض - " + roomCode;

// اسم المستخدم: من تيليغرام لو متوفر، وإلا نسأله مرة وحدة
let myName = "زائر";
try {
  const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
  if (tgUser && tgUser.first_name) myName = tgUser.first_name;
} catch (e) {}
if (myName === "زائر") {
  const entered = prompt("اكتب اسمك اللي يبان بالدردشة:", "");
  if (entered && entered.trim()) myName = entered.trim();
}

let player;
let ws;
let ignoreEvents = false; // لتفادي حلقة لا نهائية عند تطبيق تحديثات جاية من طرف آخر

// ---------- مشغل يوتيوب ----------
function extractVideoId(url) {
  const patterns = [/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]{11})/];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  if (/^[\w-]{11}$/.test(url.trim())) return url.trim();
  return null;
}

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '100%', width: '100%', videoId: '',
    events: { onStateChange: onPlayerStateChange }
  });
  connectWS();
}

function loadVideoFromInput() {
  const videoId = extractVideoId(document.getElementById("urlInput").value);
  if (!videoId) { alert("رابط يوتيوب غير صالح"); return; }
  ws.send(JSON.stringify({ type: "load_video", video_id: videoId }));
}

function onPlayerStateChange(event) {
  if (ignoreEvents || !ws || ws.readyState !== 1) return;
  const currentTime = player.getCurrentTime();
  if (event.data === YT.PlayerState.PLAYING) {
    ws.send(JSON.stringify({ type: "play", current_time: currentTime }));
  } else if (event.data === YT.PlayerState.PAUSED) {
    ws.send(JSON.stringify({ type: "pause", current_time: currentTime }));
  }
}

// ---------- اتصال الويب سوكت ----------
function connectWS() {
  const protocol = window.location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${protocol}://${window.location.host}/ws/${roomCode}`);

  ws.onopen = () => setStatus("متصل ✅ - الغرفة: " + roomCode);
  ws.onclose = () => { setStatus("انقطع الاتصال، جاري إعادة المحاولة..."); setTimeout(connectWS, 2000); };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    switch (data.type) {
      case "sync":
      case "load_video":
        ignoreEvents = true;
        if (data.video_id) player.loadVideoById(data.video_id, data.current_time || 0);
        if (data.is_playing === false) setTimeout(() => player.pauseVideo(), 300);
        setTimeout(() => { ignoreEvents = false; }, 500);
        break;

      case "play":
        ignoreEvents = true;
        player.seekTo(data.current_time, true);
        player.playVideo();
        setTimeout(() => { ignoreEvents = false; }, 500);
        break;

      case "pause":
        ignoreEvents = true;
        player.seekTo(data.current_time, true);
        player.pauseVideo();
        setTimeout(() => { ignoreEvents = false; }, 500);
        break;

      case "seek":
        ignoreEvents = true;
        player.seekTo(data.current_time, true);
        setTimeout(() => { ignoreEvents = false; }, 500);
        break;

      case "viewers":
        setStatus(`متصل ✅ - الغرفة: ${roomCode} - المشاهدين: ${data.count}`);
        break;

      case "chat":
        addChatMessage(data.name, data.text, null, null);
        break;

      case "image":
        addChatMessage(data.name, null, data.data, null);
        break;

      case "voice":
        addChatMessage(data.name, null, null, data.data);
        break;

      case "error":
        alert(data.message);
        break;
    }
  };
}

function setStatus(text) { document.getElementById("status").innerText = text; }

// ---------- الدردشة ----------
function addChatMessage(name, text, imageData, voiceData) {
  const box = document.getElementById("chat-box");
  const div = document.createElement("div");
  div.className = "msg";

  const nameSpan = document.createElement("span");
  nameSpan.className = "name";
  nameSpan.innerText = name + ": ";
  div.appendChild(nameSpan);

  if (text) div.appendChild(document.createTextNode(text));

  if (imageData) {
    const img = document.createElement("img");
    img.src = imageData;
    img.onclick = () => {
      document.getElementById("imgModalSrc").src = imageData;
      document.getElementById("imgModal").style.display = "flex";
    };
    div.appendChild(document.createElement("br"));
    div.appendChild(img);
  }

  if (voiceData) {
    const audio = document.createElement("audio");
    audio.controls = true;
    audio.src = voiceData;
    div.appendChild(document.createElement("br"));
    div.appendChild(audio);
  }

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function sendChat() {
  const input = document.getElementById("chatText");
  const text = input.value.trim();
  if (!text) return;
  ws.send(JSON.stringify({ type: "chat", name: myName, text }));
  input.value = "";
}

function onImageSelected(event) {
  const file = event.target.files[0];
  if (!file) return;

  // نصغّر الصورة قبل الإرسال لتفادي رسائل ثقيلة جداً
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const maxDim = 1000;
      let { width, height } = img;
      if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; }
      else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.7);
      ws.send(JSON.stringify({ type: "image", name: myName, data: dataUrl }));
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
  event.target.value = "";
}

// ---------- الرسائل الصوتية ----------
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let recordStartTime = 0;
let recTimerInterval = null;

async function toggleRecording() {
  if (!isRecording) {
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      alert("ما قدرنا نوصل للمايكروفون. تأكد من إعطاء الإذن.");
      return;
    }

    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: "audio/webm" });
      const reader = new FileReader();
      reader.onload = () => {
        ws.send(JSON.stringify({ type: "voice", name: myName, data: reader.result }));
      };
      reader.readAsDataURL(blob);
    };

    mediaRecorder.start();
    isRecording = true;
    recordStartTime = Date.now();
    document.getElementById("micBtn").classList.add("recording");
    recTimerInterval = setInterval(() => {
      const secs = Math.floor((Date.now() - recordStartTime) / 1000);
      document.getElementById("recTimer").innerText = `⏺ ${secs}s`;
    }, 300);
  } else {
    mediaRecorder.stop();
    isRecording = false;
    clearInterval(recTimerInterval);
    document.getElementById("recTimer").innerText = "";
    document.getElementById("micBtn").classList.remove("recording");
  }
}
</script>
</body>
</html>
