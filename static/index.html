<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاهدة يوتيوب مع بعض</title>
<style>
  body {
    font-family: -apple-system, "Segoe UI", Tahoma, sans-serif;
    background: #0e0e12;
    color: #eee;
    margin: 0;
    padding: 16px;
  }
  h2 { margin: 0 0 12px; font-size: 18px; }
  .row { display: flex; gap: 8px; margin-bottom: 12px; }
  .row input {
    flex: 1;
    padding: 10px;
    font-size: 14px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #1a1a20;
    color: #eee;
  }
  .row button {
    padding: 10px 16px;
    font-size: 14px;
    border-radius: 8px;
    border: none;
    background: #2b7cff;
    color: #fff;
    cursor: pointer;
  }
  #player-wrap {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
  }
  #player { width: 100%; height: 100%; }
  #status {
    margin-top: 10px;
    font-size: 13px;
    color: #7fb0ff;
  }
</style>
</head>
<body>

<h2>🎬 مشاهدة يوتيوب مع بعض</h2>

<div class="row">
  <input id="urlInput" placeholder="الصق رابط فيديو يوتيوب هنا">
  <button onclick="loadVideoFromInput()">تشغيل للجميع</button>
</div>

<div id="player-wrap">
  <div id="player"></div>
</div>

<div id="status">جاري الاتصال...</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// لو الصفحة مفتوحة جوا تيليغرام (كـ Mini App)، وسّعها لتاخذ كامل الشاشة
if (window.Telegram && window.Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

const params = new URLSearchParams(window.location.search);
const roomCode = params.get("room") || "public";
document.title = "مشاهدة مع بعض - " + roomCode;

let player;
let ws;
let ignoreEvents = false; // لتفادي حلقة لا نهائية عند تطبيق تحديثات جاية من طرف آخر

function extractVideoId(url) {
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]{11})/
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  if (/^[\w-]{11}$/.test(url.trim())) return url.trim();
  return null;
}

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '100%',
    width: '100%',
    videoId: '',
    events: { onStateChange: onPlayerStateChange }
  });
  connectWS();
}

function connectWS() {
  const protocol = window.location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${protocol}://${window.location.host}/ws/${roomCode}`);

  ws.onopen = () => setStatus("متصل ✅ - الغرفة: " + roomCode);
  ws.onclose = () => {
    setStatus("انقطع الاتصال، جاري إعادة المحاولة...");
    setTimeout(connectWS, 2000);
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    ignoreEvents = true;

    if (data.type === "sync" || data.type === "load_video") {
      if (data.video_id) player.loadVideoById(data.video_id, data.current_time || 0);
      if (data.is_playing === false) setTimeout(() => player.pauseVideo(), 300);
    } else if (data.type === "play") {
      player.seekTo(data.current_time, true);
      player.playVideo();
    } else if (data.type === "pause") {
      player.seekTo(data.current_time, true);
      player.pauseVideo();
    } else if (data.type === "seek") {
      player.seekTo(data.current_time, true);
    } else if (data.type === "viewers") {
      setStatus(`متصل ✅ - الغرفة: ${roomCode} - المشاهدين المتصلين: ${data.count}`);
    }

    setTimeout(() => { ignoreEvents = false; }, 500);
  };
}

function setStatus(text) {
  document.getElementById("status").innerText = text;
}

function loadVideoFromInput() {
  const url = document.getElementById("urlInput").value;
  const videoId = extractVideoId(url);
  if (!videoId) { alert("رابط يوتيوب غير صالح"); return; }
  ws.send(JSON.stringify({ type: "load_video", video_id: videoId }));
}

function onPlayerStateChange(event) {
  if (ignoreEvents || !ws || ws.readyState !== 1) return;
  const currentTime = player.getCurrentTime();

  if (event.data === YT.PlayerState.PLAYING) {
    ws.send(JSON.stringify({ type: "play", current_time: currentTime }));
  } else if (event.data === YT.PlayerState.PAUSED) {
    ws.send(JSON.stringify({ type: "pause", current_time: currentTime }));
  }
}
</script>
</body>
</html>
